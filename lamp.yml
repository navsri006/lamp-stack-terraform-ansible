---
- hosts: lamp_servers
  become: yes
  tasks:

    - name: Update all packages
      yum:
        name: "*"
        state: latest
      when: ansible_os_family == "RedHat"

    - name: Update all packages (Ubuntu)
      apt:
        update_cache: yes
        upgrade: dist
      when: ansible_os_family == "Debian"

    - name: Install Apache
      yum:
        name: httpd
        state: present
      when: ansible_os_family == "RedHat"

    - name: Install Apache (Ubuntu)
      apt:
        name: apache2
        state: present
      when: ansible_os_family == "Debian"

    - name: Start and enable Apache
      service:
        name: "{{ 'httpd' if ansible_os_family == 'RedHat' else 'apache2' }}"
        state: started
        enabled: yes

    - name: Install MySQL / MariaDB
      yum:
        name: mariadb-server
        state: present
      when: ansible_os_family == "RedHat"

    - name: Install MySQL (Ubuntu)
      apt:
        name: mysql-server
        state: present
      when: ansible_os_family == "Debian"

    - name: Start and enable MySQL
      service:
        name: "{{ 'mariadb' if ansible_os_family == 'RedHat' else 'mysql' }}"
        state: started
        enabled: yes

    - name: Install PHP
      yum:
        name:
          - php
          - php-mysqlnd
          - php-cli
          - php-gd
          - php-curl
          - php-mbstring
          - php-xml
        state: present
      when: ansible_os_family == "RedHat"

    - name: Install PHP (Ubuntu)
      apt:
        name:
          - php
          - libapache2-mod-php
          - php-mysql
        state: present
      when: ansible_os_family == "Debian"

    - name: Create test PHP page
      copy:
        content: "<?php phpinfo(); ?>"
        dest: /var/www/html/info.php
